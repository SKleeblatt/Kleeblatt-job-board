name: Update Job List

on:
  schedule:
    # ירוץ בכל יום בשעה 08:00 בבוקר (שעון UTC)
    - cron: '0 8 * * *'
  workflow_dispatch: # מאפשר הפעלה ידנית בלחיצת כפתור

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    # הגדרת משתנה סביבה שמאלץ שימוש ב-Node.js 24 ומעלים את האזהרה
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # שלב חובה עבור הסריקה של האתרים העצמאיים (Custom)
      - name: Install Playwright Browsers
        run: python -m playwright install --with-deps chromium

      - name: Run scraping script
        run: python scrape_jobs.py

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Updated job list automatically"
          file_pattern: README.md
