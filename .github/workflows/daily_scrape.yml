name: Update Job List

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # מביא את כל ההיסטוריה כדי שנוכל לתקן את ההתנגשות

      # שלב חדש: פותר את בעיית ה-Diverged באופן אקטיבי ומאפס את השרת הזמני לענן
      - name: Fix Git Divergence
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: python -m playwright install --with-deps chromium

      - name: Run scraping script
        run: python scrape_jobs.py

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Updated job board and categories automatically"
          file_pattern: "README.md jobs/*.md"
          push_options: '--force' # מאלץ דחיפה גם אם יש התנגדות קלה בענן
